trigger: none

pr: none

variables:
  - name: DOCKER_IMAGE_NAME
    value: 'atlas-match-prediction'
  - name: DOCKER_IMAGE_TAG
    value: '$(Build.BuildNumber)'
  - name: ACR_LOGIN_SERVER
    value: 'ancontainerregistry.azurecr.io'

stages:
  - stage: Build
    displayName: 'Build'
    jobs:
      - job: Docker
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: Docker@2
            displayName: 'Build and push image to ACR'
            inputs:
              command: 'buildAndPush'
              repository: $(DOCKER_IMAGE_NAME)
              buildContext: '$(System.DefaultWorkingDirectory)'
              dockerfile: 'Atlas.MatchPrediction.Worker/Dockerfile'
              containerRegistry: 'AN Container Registry-Atlas'
              tags: |
                $(DOCKER_IMAGE_TAG)

  - stage: DeployDev
    displayName: 'Deploy to Dev'
    dependsOn: Build
    variables:
      - name: CONTAINER_APP_NAME
        value: 'dev-atlas-match-prediction-ca'
      - name: CONTAINER_APP_ENVIRONMENT
        value: 'DEV-ATLAS-CONTAINER-APPS-ENV'
      - name: RESOURCE_GROUP
        value: 'DEV-ATLAS-RESOURCE-GROUP'
    jobs:
      - deployment: DeployDev
        displayName: 'Deploy to Dev'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'Dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: 'Validate existing Container App resources'
                  inputs:
                    azureSubscription: 'Atlas Dev WIF'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      set -euo pipefail

                      az config set extension.use_dynamic_install=yes_without_prompt

                      echo "Checking Container Apps environment $(CONTAINER_APP_ENVIRONMENT) in $(RESOURCE_GROUP)"
                      az containerapp env show \
                        --name "$(CONTAINER_APP_ENVIRONMENT)" \
                        --resource-group "$(RESOURCE_GROUP)" \
                        --output none

                      echo "Checking Container App $(CONTAINER_APP_NAME) in $(RESOURCE_GROUP)"
                      az containerapp show \
                        --name "$(CONTAINER_APP_NAME)" \
                        --resource-group "$(RESOURCE_GROUP)" \
                        --output none

                - task: AzureContainerApps@1
                  displayName: 'Deploy to Dev Container App'
                  inputs:
                    azureSubscription: 'Atlas Dev WIF'
                    containerAppName: '$(CONTAINER_APP_NAME)'
                    containerAppEnvironment: '$(CONTAINER_APP_ENVIRONMENT)'
                    resourceGroup: '$(RESOURCE_GROUP)'
                    imageToDeploy: '$(ACR_LOGIN_SERVER)/$(DOCKER_IMAGE_NAME):$(DOCKER_IMAGE_TAG)'